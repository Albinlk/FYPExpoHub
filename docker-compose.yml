services:
  fyp-expo-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: fyp-expo-hub:latest
    container_name: fyp_expo_hub
    restart: unless-stopped
    ports:
      - "${PORT:-8081}:80"
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
