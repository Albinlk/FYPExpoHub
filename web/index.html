<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FYP Expo Hub - UiTM FSKM Final Year Project Exhibition">

  <!-- Preload local WOFF2 fonts for instant, crisp rendering (smaller than TTF) -->
  <link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/Inter-Regular.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/Inter-Medium.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/Inter-SemiBold.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/Inter-Bold.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/Montserrat-Regular.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/Montserrat-Medium.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/Montserrat-SemiBold.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/Montserrat-Bold.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/Montserrat-ExtraBold.woff2">

  <!-- Local font-face definitions (loaded instantly from preload) -->
  <style>
    @font-face {
      font-family: 'Inter';
      src: url('fonts/Inter-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('fonts/Inter-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('fonts/Inter-SemiBold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('fonts/Inter-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-SemiBold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-ExtraBold.woff2') format('woff2');
      font-weight: 800;
      font-style: normal;
      font-display: swap;
    }

    /* Ensure crisp text rendering on all platforms */
    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    html {
      -webkit-text-size-adjust: 100%;
    }
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    /* Hide the loading flash */
    flt-glass-pane {
      position: fixed !important;
    }
  </style>

  <!-- Google Fonts fallback (loaded after local fonts via font-display: swap) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="fyp_expo_hub">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FYP Expo Hub</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Use HTML renderer for crisp text rendering on web (instead of CanvasKit).
    CanvasKit renders text as paths which can appear jagged on some displays.
    HTML renderer uses native browser text rendering for sharp, crisp fonts.
  -->
  <script>
    window.flutterWebRenderer = "html";
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
